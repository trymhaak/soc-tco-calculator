<!DOCTYPE html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOC TCO Kalkulator – SoftwareOne</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #F4F4F4; font-family: Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
        border-radius: 50%; background: var(--thumb-color, #5B49DE); cursor: pointer;
        border: 3px solid #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px; height: 16px; border-radius: 50%; background: var(--thumb-color, #5B49DE);
        cursor: pointer; border: 3px solid #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type="number"] { -moz-appearance: textfield; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
